<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | The Kitchen Archive</title>

    <link rel="stylesheet" href="../static/css/bootstrap/bootstrap.min.css">
    <link rel="stylesheet" href="../static/css/login.css">
    <script src="../static/js/regcheck.js"></script>
</head>

<body>

    <main class="auth-page login-page">
        <div class="auth-shell">
            <div class="auth-panel text-light">
                <a href="../index.html" class="auth-logo-link">
                    <img src="../static/img/logo-black.png" class="auth-logo" alt="The Kitchen Archive logo">
                </a>

                <form id="login">
                    <h2 class="mb-4 text-center">Welcome Back!</h2>

                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="Email" placeholder="name@example.com">
                        <label for="floatingInput">Email address or Password</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="Password" placeholder="Password">
                        <label for="floatingPassword">Password</label>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                        <label class="form-check-label" for="checkDefault">
                            Remember Me
                        </label>
                    </div>

                    <div id="liveAlertPlaceholder" class="mb-3"></div>
                    <button class="btn btn-dark w-100" type="submit">Login</button>

                    <p class="text-center mt-3">Don't have an account? <a href="signup.html" class="text-light" style="text-decoration: none;"><strong>Sign Up</strong></a></p>
                </form>
            </div>
        </div>
    </main>

    <script src="../static/js/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="../static/js/login.js"></script>
